<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Énosi Holding — Struttura del Gruppo v3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #110810;
  --burgundy: #6B1C23;
  --burgundy-mid: #8B2D35;
  --burgundy-light: #A94452;
  --gold: #C9A96E;
  --gold-dim: rgba(201,169,110,0.25);
  --text: #F5F0EB;
  --text-dim: rgba(245,240,235,0.4);
  --border: rgba(107,28,35,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;}

.bg-glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(120px);}
.bg-g1{width:600px;height:600px;background:rgba(107,28,35,0.12);top:-150px;left:-100px;animation:gd 20s ease-in-out infinite;}
.bg-g2{width:500px;height:500px;background:rgba(201,169,110,0.06);bottom:-100px;right:-80px;animation:gd 28s ease-in-out infinite reverse;}
@keyframes gd{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}

.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 36px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,var(--bg) 60%,transparent);}
.hdr h1{font-family:'Playfair Display';font-size:1.2rem;font-weight:600;}
.hdr h1 span{color:var(--gold);}
.hdr-hint{font-size:.7rem;color:var(--text-dim);display:flex;gap:16px;align-items:center;}
.hdr-hint kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 7px;font-size:.6rem;}

.back-btn{position:fixed;top:24px;right:36px;z-index:200;width:42px;height:42px;background:rgba(107,28,35,0.25);border:1px solid var(--border);border-radius:50%;color:var(--text);font-size:1.1rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px);}
.back-btn:hover{background:rgba(107,28,35,0.5);border-color:var(--gold-dim);}
.back-btn.show{display:flex;}

.zoom-controls{position:fixed;bottom:32px;right:32px;z-index:100;display:flex;flex-direction:column;gap:4px;}
.zoom-btn{width:40px;height:40px;background:rgba(107,28,35,0.2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px);}
.zoom-btn:hover{background:rgba(107,28,35,0.4);border-color:var(--gold-dim);}

.legend{position:fixed;bottom:28px;left:28px;z-index:100;display:flex;gap:18px;font-size:.65rem;color:var(--text-dim);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}

.panel{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:linear-gradient(160deg,rgba(17,8,16,.97),rgba(30,12,18,.97));backdrop-filter:blur(30px);border-left:1px solid var(--border);z-index:150;transition:right .5s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:40px;}
.panel.open{right:0;}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}
.panel-badge{display:inline-block;padding:4px 14px;border-radius:100px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;}
.panel-name{font-family:'Playfair Display';font-size:1.7rem;font-weight:700;margin-bottom:6px;line-height:1.2;}
.panel-pct{font-size:2.2rem;font-weight:700;color:var(--gold);margin-bottom:20px;}
.panel-desc{font-size:.88rem;line-height:1.8;color:rgba(245,240,235,.65);margin-bottom:28px;}
.panel-parent{padding-top:20px;border-top:1px solid var(--border);font-size:.72rem;color:var(--text-dim);}
.panel-parent strong{color:var(--text);}
.panel-subs{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.panel-subs-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);margin-bottom:10px;}
.panel-sub{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:padding-left .2s;}
.panel-sub:hover{padding-left:8px;color:var(--gold);}
.panel-sub span:last-child{color:var(--gold);font-weight:600;font-size:.8rem;}

.eco-label{position:fixed;top:80px;left:36px;z-index:100;opacity:0;transition:opacity .5s;pointer-events:none;}
.eco-label.show{opacity:1;}
.eco-label h2{font-family:'Playfair Display';font-size:1.4rem;font-weight:600;margin-bottom:4px;}
.eco-label p{font-size:.75rem;color:var(--text-dim);}
.eco-label .eco-back{margin-top:12px;font-size:.72rem;color:var(--gold);cursor:pointer;pointer-events:auto;display:flex;align-items:center;gap:6px;}
.eco-label .eco-back:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="bg-glow bg-g1"></div>
<div class="bg-glow bg-g2"></div>

<div class="hdr">
  <h1>La struttura del <span>Gruppo</span></h1>
  <div class="hdr-hint">
    <span><kbd>scroll</kbd> zoom</span>
    <span><kbd>drag</kbd> naviga</span>
    <span><kbd>click</kbd> esplora</span>
  </div>
</div>

<button class="back-btn" id="backBtn" title="Torna alla vista completa">✕</button>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoomIn">+</button>
  <button class="zoom-btn" id="zoomOut">−</button>
  <button class="zoom-btn" id="zoomReset" style="font-size:.7rem">⟲</button>
</div>

<div class="eco-label" id="ecoLabel">
  <h2 id="ecoTitle"></h2>
  <p id="ecoSub"></p>
  <div class="eco-back" id="ecoBack">← Vista completa</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C9A96E"></div>Holding</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6B1C23"></div>Partecipate</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8B2D35"></div>Controllate</div>
  <div class="legend-item"><div class="legend-dot" style="background:#A94452"></div>Sub-controllate</div>
</div>

<div class="panel" id="panel"><div id="panelContent"></div></div>

<canvas id="canvas"></canvas>

<script>
// ===== DATA =====
const companies = [
  {id:'holding',name:'Énosi Holding',level:0,pct:'',sector:'Holding',
   desc:'Holding che vanta diverse partecipazioni in molteplici settori industriali. Modello dinamico orientato alla creazione di valore.'},
  {id:'enopharma',name:'Énopharma',level:1,pct:'100%',sector:'Pharma',parent:'holding',
   desc:'Società operante nel settore farmaceutico, dedicata alla ricerca e sviluppo di soluzioni innovative.'},
  {id:'gastro',name:'Énosi Gastro',level:1,pct:'50%',sector:'Food',parent:'holding',
   desc:'Realtà dedicata al settore della ristorazione e dell\'enogastronomia di qualità.'},
  {id:'celera',name:'Celera Digital',level:1,pct:'100%',sector:'ICT',parent:'holding',
   desc:'Start-up innovativa certificata. Piattaforma digitale brevettata per l\'interconnessione delle informazioni.'},
  {id:'edilmoaf',name:'Edil Moaf',level:1,pct:'10%',sector:'Engineering',parent:'holding',
   desc:'Progettazione, realizzazione e manutenzione di infrastrutture: opere civili, industriali, sanitarie, ferroviarie.'},
  {id:'consultreal',name:'Consult Real',level:1,pct:'10%',sector:'Consulenza',parent:'holding',
   desc:'Consulenza immobiliare e strategica al servizio del gruppo.'},
  {id:'siag',name:'SIAG Coffee',level:1,pct:'100%',sector:'Food',parent:'holding',
   desc:'Caffè tradizionale napoletano. Cialde, capsule, grani e macinato sotto il marchio SIAG.'},
  {id:'ingenosi',name:'Ingenosi',level:1,pct:'90%',sector:'Engineering',parent:'holding',
   desc:'Ingegneria, R&S, Transizione 4.0, asseverazioni tecniche, brevetti, efficienza energetica.'},
  {id:'aelodea',name:'Aelodea',level:1,pct:'51%',sector:'MedTech',parent:'holding',
   desc:'Già Sinaloina. Materie prime Aloe Vera per cosmetico, integratori e farmaceutico.'},
  {id:'enosispa',name:'Énosi S.p.A.',level:1,pct:'100%',sector:'Consulenza',parent:'holding',
   desc:'Consulenza multidisciplinare dal 2013. Legale, tributaria, finanziaria, digitale, comunicazione, PR.'},
  {id:'areacrm',name:'Area CRM',level:1,pct:'100%',sector:'ICT',parent:'holding',
   desc:'Content marketing e customer relationship management con approccio strategico integrato.'},
  {id:'re',name:'Énosi RE',level:1,pct:'100%',sector:'Real Estate',parent:'holding',
   desc:'Acquisto, vendita, riqualificazione immobili. Sviluppo attivo di asset strategici.'},
  {id:'quasardam',name:'Quasardam',level:1,pct:'10%',sector:'MedTech',parent:'holding',
   desc:'Tecnologie mediche avanzate per patologie oculari. Dispositivi brevettati di precisione clinica.'},
  {id:'e3',name:'Eutecna E3',level:1,pct:'Partner',sector:'Engineering',parent:'holding',
   desc:'Finanza agevolata, innovazione 4.0/5.0, internazionalizzazione. Partner ufficiale del gruppo.'},
  {id:'consulting',name:'Consulting',level:1,pct:'100%',sector:'Consulenza',parent:'holding',
   desc:'Sede a Londra. Consulenza strategica PMI. Internazionalizzazione del gruppo.'},
  {id:'finix',name:'Finix',level:2,pct:'100%',sector:'ICT',parent:'siag',
   desc:'Successore Fujitsu Italia. Cloud, AI, IoT, SAP. Rappresentanza esclusiva Fujitsu.'},
  {id:'biogenera',name:'Biogenera',level:2,pct:'1.81%',sector:'MedTech',parent:'enosispa',
   desc:'Biotecnologie e ricerca biomedica.'},
  {id:'blusky',name:'Blu Sky',level:2,pct:'2.84%',sector:'Consulenza',parent:'enosispa',
   desc:'Angel Lab. Piattaforma di investimento e accelerazione per startup innovative.'},
  {id:'hbtc',name:'HBTC',level:2,pct:'',sector:'ICT',parent:'enosispa',
   desc:'Società tecnologica dell\'ecosistema Énosi S.p.A.'},
  {id:'monserrato',name:'Monserrato',level:2,pct:'98%',sector:'Real Estate',parent:'re',
   desc:'Edificio 4.000 mq in sviluppo come struttura residenziale per anziani.'},
  {id:'codex',name:'Codex',level:2,pct:'25%',sector:'Cybersecurity',parent:'consulting',
   desc:'Cybersecurity avanzata per infrastrutture digitali.'},
  {id:'blackshield',name:'Blackshield',level:2,pct:'49%',sector:'Cybersecurity',parent:'consulting',
   desc:'OSINT e AI. 184 lingue, tutte le piattaforme social.'},
  {id:'digix',name:'Digix',level:2,pct:'100%',sector:'ICT',parent:'consulting',
   desc:'Digital Experience. 70+ professionisti. Finance, Retail, Engineering, Manufacturing, Energy.'},
  {id:'cyberangels',name:'Cyberangels',level:3,pct:'5.58%',sector:'Cybersecurity',parent:'blusky',
   desc:'Cyber Insurance per micro e piccole imprese. Best InsurTech 2021.'},
];

const sectorColor = {
  Holding:'#C9A96E',ICT:'#4A90D9',Consulenza:'#B85A63','Real Estate':'#2D8A4E',
  Engineering:'#B4823C',MedTech:'#8250AA',Food:'#C87832',Cybersecurity:'#3CA0B4',Pharma:'#64AA78'
};

const level1 = companies.filter(c => c.level === 1);
const level2 = companies.filter(c => c.level === 2);
const level3 = companies.filter(c => c.level === 3);

level1.forEach((c, i) => { c.baseAngle = (i / level1.length) * Math.PI * 2 - Math.PI / 2; });

// ===== CANVAS =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ===== CAMERA (pan + zoom) =====
let camX = 0, camY = 0, camZoom = 0.55; // Start zoomed out to see everything
let targetCamX = 0, targetCamY = 0, targetCamZoom = 0.55;
let isDragging = false, dragStartX, dragStartY, dragCamX, dragCamY;

// Convert world coords to screen coords
function toScreen(wx, wy) {
  return {
    x: (wx - camX) * camZoom + W / 2,
    y: (wy - camY) * camZoom + H / 2
  };
}

// Convert screen coords to world coords
function toWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camZoom + camX,
    y: (sy - H / 2) / camZoom + camY
  };
}

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.96 : 1.04;
  targetCamZoom = Math.max(0.15, Math.min(3, targetCamZoom * factor));
}, { passive: false });

// Pan with drag
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  // Check if clicking a node first
  const world = toWorld(e.clientX, e.clientY);
  const clickedNode = findNodeAt(world.x, world.y);
  if (clickedNode) return; // Let click handler deal with it

  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragCamX = targetCamX;
  dragCamY = targetCamY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const dx = (e.clientX - dragStartX) / camZoom;
    const dy = (e.clientY - dragStartY) / camZoom;
    targetCamX = dragCamX - dx;
    targetCamY = dragCamY - dy;
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
});

canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Zoom buttons
document.getElementById('zoomIn').addEventListener('click', () => { targetCamZoom = Math.min(3, targetCamZoom * 1.4); });
document.getElementById('zoomOut').addEventListener('click', () => { targetCamZoom = Math.max(0.15, targetCamZoom * 0.7); });
document.getElementById('zoomReset').addEventListener('click', () => { targetCamX = 0; targetCamY = 0; targetCamZoom = 0.55; });

// ===== LAYOUT =====
const ORBIT_R1 = 520;    // Much larger orbit for level 1
const CENTER_R = 75;     // Center node 40% bigger
const L1_R = 42;         // Level 1 nodes 30% bigger
const L2_R = 28;         // Level 2
const L3_R = 20;         // Level 3
const MOON_ORBIT = 110;  // Distance planet → moon (was 65)
const MOON3_ORBIT = 60;  // Distance moon → sub-moon (was 40)

// ===== ANIMATION STATE =====
let rotationAngle = 0;
const ROTATION_SPEED = 0.00015; // Even slower
let isZoomed = false;
let zoomedPlanetId = null;
let fadeTransition = 1; // 1 = all visible
let fadeTarget = 1;
let selectedNodeId = null;
let time = 0;
let hoveredNode = null;

// ===== NODE POSITIONS (world space) =====
function getNodePos(c) {
  if (c.level === 0) return { x: 0, y: 0 };

  if (c.level === 1) {
    const angle = c.baseAngle + rotationAngle;
    return { x: Math.cos(angle) * ORBIT_R1, y: Math.sin(angle) * ORBIT_R1 };
  }

  if (c.level === 2) {
    const parent = companies.find(p => p.id === c.parent);
    const pp = getNodePos(parent);
    const siblings = level2.filter(s => s.parent === c.parent);
    const idx = siblings.indexOf(c);
    const angle = (idx / siblings.length) * Math.PI * 2 + rotationAngle * 1.5;
    return { x: pp.x + Math.cos(angle) * MOON_ORBIT, y: pp.y + Math.sin(angle) * MOON_ORBIT };
  }

  if (c.level === 3) {
    const parent = companies.find(p => p.id === c.parent);
    const pp = getNodePos(parent);
    const siblings = level3.filter(s => s.parent === c.parent);
    const idx = siblings.indexOf(c);
    const angle = (idx / siblings.length) * Math.PI * 2 + rotationAngle * 2;
    return { x: pp.x + Math.cos(angle) * MOON3_ORBIT, y: pp.y + Math.sin(angle) * MOON3_ORBIT };
  }
  return { x: 0, y: 0 };
}

function getRadius(c) {
  return c.level === 0 ? CENTER_R : c.level === 1 ? L1_R : c.level === 2 ? L2_R : L3_R;
}

function isInBranch(nodeId, planetId) {
  if (nodeId === planetId || nodeId === 'holding') return true;
  const node = companies.find(c => c.id === nodeId);
  if (!node) return false;
  if (node.parent === planetId) return true;
  const parent = companies.find(c => c.id === node.parent);
  if (parent && parent.parent === planetId) return true;
  if (parent) {
    const gp = companies.find(c => c.id === parent.parent);
    if (gp && gp.parent === planetId) return true;
  }
  return false;
}

function findNodeAt(wx, wy) {
  // Check in reverse order (smallest on top)
  for (let i = companies.length - 1; i >= 0; i--) {
    const c = companies[i];
    const pos = getNodePos(c);
    const r = getRadius(c);
    const dx = wx - pos.x, dy = wy - pos.y;
    if (dx * dx + dy * dy < (r + 8) * (r + 8)) return c;
  }
  return null;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ===== DRAW =====
function draw() {
  time++;
  ctx.clearRect(0, 0, W, H);

  // Smooth camera
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;
  camZoom += (targetCamZoom - camZoom) * 0.08;

  // Smooth fade
  fadeTransition += (fadeTarget - fadeTransition) * 0.05;

  // Rotate
  if (!isZoomed) rotationAngle += ROTATION_SPEED;

  // Draw orbit ring
  const orbitScreen = toScreen(0, 0);
  const orbitRScreen = ORBIT_R1 * camZoom;
  ctx.beginPath();
  ctx.arc(orbitScreen.x, orbitScreen.y, orbitRScreen, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(107,28,35,${0.06 * fadeTransition})`;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 10]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Get opacity for each node
  const getOpacity = (c) => {
    if (!isZoomed || !zoomedPlanetId) return 1;
    return isInBranch(c.id, zoomedPlanetId) ? 1 : fadeTransition;
  };

  // Draw connections
  companies.filter(c => c.parent).forEach(c => {
    const from = getNodePos(companies.find(p => p.id === c.parent));
    const to = getNodePos(c);
    const s1 = toScreen(from.x, from.y);
    const s2 = toScreen(to.x, to.y);
    const opacity = getOpacity(c) * 0.3;
    if (opacity < 0.01) return;

    const isHL = hoveredNode && isInBranch(c.id, hoveredNode);
    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.lineTo(s2.x, s2.y);
    ctx.strokeStyle = isHL ? `rgba(201,169,110,${opacity * 3})` : `rgba(107,28,35,${opacity})`;
    ctx.lineWidth = (isHL ? 2 : 1) * camZoom;
    ctx.stroke();
  });

  // Draw nodes
  const drawOrder = [...companies].sort((a, b) => b.level - a.level);

  drawOrder.forEach(c => {
    const wpos = getNodePos(c);
    const pos = toScreen(wpos.x, wpos.y);
    const r = getRadius(c) * camZoom;
    const opacity = getOpacity(c);
    if (opacity < 0.01 || r < 2) return;

    const isH = hoveredNode === c.id;
    const isS = selectedNodeId === c.id;

    // Glow
    if (c.level === 0 || isH || isS) {
      const glowR = r + (c.level === 0 ? 25 : 14) * camZoom;
      const grd = ctx.createRadialGradient(pos.x, pos.y, r * 0.5, pos.x, pos.y, glowR);
      const gc = c.level === 0 ? '201,169,110' : '107,28,35';
      grd.addColorStop(0, `rgba(${gc},${0.25 * opacity})`);
      grd.addColorStop(1, `rgba(${gc},0)`);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Center pulse
    if (c.level === 0) {
      const pr = r + (12 + Math.sin(time * 0.02) * 8) * camZoom;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, pr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(201,169,110,${(0.15 + Math.sin(time * 0.02) * 0.1) * opacity})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Circle fill
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    if (c.level === 0) {
      const grd = ctx.createRadialGradient(pos.x - r * 0.3, pos.y - r * 0.3, 0, pos.x, pos.y, r);
      grd.addColorStop(0, `rgba(218,190,130,${opacity})`);
      grd.addColorStop(1, `rgba(170,140,80,${opacity})`);
      ctx.fillStyle = grd;
    } else {
      ctx.fillStyle = `rgba(18,8,12,${opacity * 0.9})`;
    }
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    const colors = { 0: '#C9A96E', 1: '#6B1C23', 2: '#8B2D35', 3: '#A94452' };
    const borderColor = isH || isS ? '#C9A96E' : (colors[c.level] || '#6B1C23');
    ctx.strokeStyle = `rgba(${hexToRgb(borderColor)},${(isH || isS ? 1 : 0.6) * opacity})`;
    ctx.lineWidth = (isH || isS ? 2.5 : 1.5) * Math.min(camZoom, 1.5);
    ctx.stroke();

    // Labels (only show if big enough)
    if (r > 8) {
      const fontSize = Math.max(7, (c.level === 0 ? 13 : c.level === 1 ? 10.5 : 8.5) * Math.min(camZoom, 1.8));
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${c.level === 0 ? 600 : 500} ${fontSize}px Inter`;
      ctx.fillStyle = `rgba(245,240,235,${opacity * 0.95})`;

      const name = c.name;
      if (name.length > 11 && r > 15) {
        const words = name.split(' ');
        if (words.length >= 2) {
          ctx.fillText(words[0], pos.x, pos.y - fontSize * 0.35);
          ctx.fillText(words.slice(1).join(' '), pos.x, pos.y + fontSize * 0.55);
        } else {
          ctx.fillText(name, pos.x, pos.y);
        }
      } else {
        ctx.fillText(name, pos.x, pos.y - (c.pct && r > 20 ? 3 : 0));
      }

      // Percentage
      if (c.pct && c.level > 0 && r > 14) {
        const pctSize = Math.max(6, 8 * Math.min(camZoom, 1.5));
        ctx.font = `700 ${pctSize}px Inter`;
        ctx.fillStyle = `rgba(201,169,110,${opacity * 0.7})`;
        ctx.fillText(c.pct, pos.x, pos.y + r + 14 * Math.min(camZoom, 1.2));
      }
    }
  });

  requestAnimationFrame(draw);
}

// ===== MOUSE INTERACTION =====
canvas.addEventListener('mousemove', (e) => {
  if (isDragging) return;
  const world = toWorld(e.clientX, e.clientY);
  const found = findNodeAt(world.x, world.y);
  hoveredNode = found ? found.id : null;
  canvas.style.cursor = found ? 'pointer' : 'grab';
});

canvas.addEventListener('click', (e) => {
  if (isDragging) return;
  const world = toWorld(e.clientX, e.clientY);
  const clicked = findNodeAt(world.x, world.y);

  if (clicked) {
    handleNodeClick(clicked);
  } else if (!isZoomed) {
    closePanel();
  }
});

function handleNodeClick(c) {
  selectedNodeId = c.id;

  if (c.level === 1 && !isZoomed) {
    zoomIntoPlanet(c);
  } else if (c.level === 0 && isZoomed) {
    zoomOut();
  } else {
    showPanel(c);
  }

  if (isZoomed || c.level !== 1) showPanel(c);
}

function zoomIntoPlanet(c) {
  isZoomed = true;
  zoomedPlanetId = c.id;
  fadeTarget = 0.04;

  // Zoom camera to planet — center in LEFT half (panel takes right 460px)
  const pos = getNodePos(c);
  const panelWidth = 460;
  const leftCenterOffset = panelWidth / 2;
  const zoomTo = 1.2;
  targetCamX = pos.x + leftCenterOffset / zoomTo;
  targetCamY = pos.y;
  targetCamZoom = zoomTo;

  document.getElementById('backBtn').classList.add('show');
  document.getElementById('ecoLabel').classList.add('show');
  document.getElementById('ecoTitle').textContent = `Ecosistema ${c.name}`;
  document.getElementById('ecoSub').textContent = c.sector + (c.pct ? ` · ${c.pct}` : '');

  showPanel(c);
}

function zoomOut() {
  isZoomed = false;
  zoomedPlanetId = null;
  fadeTarget = 1;
  selectedNodeId = null;
  targetCamX = 0;
  targetCamY = 0;
  targetCamZoom = 0.55;

  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('ecoLabel').classList.remove('show');
  closePanel();
}

function showPanel(c) {
  const panel = document.getElementById('panel');
  const content = document.getElementById('panelContent');
  const sc = sectorColor[c.sector] || '#fff';
  const parent = companies.find(p => p.id === c.parent);
  const children = companies.filter(ch => ch.parent === c.id);

  let html = `
    <div class="panel-badge" style="background:rgba(${hexToRgb(sc)},.12);color:${sc}">${c.sector}</div>
    <div class="panel-name">${c.name}</div>
    ${c.pct ? `<div class="panel-pct">${c.pct}</div>` : ''}
    <div class="panel-desc">${c.desc}</div>
  `;
  if (parent) html += `<div class="panel-parent">Controllata da <strong>${parent.name}</strong>${c.pct ? ` al ${c.pct}` : ''}</div>`;
  if (children.length > 0) {
    html += `<div class="panel-subs"><div class="panel-subs-title">Controllate</div>`;
    children.forEach(ch => { html += `<div class="panel-sub" data-id="${ch.id}"><span>${ch.name}</span><span>${ch.pct}</span></div>`; });
    html += `</div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
  content.querySelectorAll('.panel-sub').forEach(el => {
    el.addEventListener('click', () => {
      const node = companies.find(c => c.id === el.dataset.id);
      if (node) { selectedNodeId = node.id; showPanel(node); }
    });
  });
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }

document.getElementById('backBtn').addEventListener('click', zoomOut);
document.getElementById('ecoBack').addEventListener('click', zoomOut);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { if (isZoomed) zoomOut(); else closePanel(); } });

// ===== START =====
draw();
</script>
</body>
</html>
